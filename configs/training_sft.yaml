# SFT (Supervised Fine-Tuning) Configuration
# Stage 1 of alignment training: Learn from high-quality responses

stage: sft
use_flash_attention_2: true

# ============================================================================
# Model Configuration
# ============================================================================
model:
  name_or_path: meta-llama/Llama-3.2-3B
  torch_dtype: bfloat16  # A100 supports bfloat16 natively
  device_map: auto  # Automatically use available GPU(s) - works with SLURM
  trust_remote_code: true

# ============================================================================
# LoRA Configuration (Memory-efficient fine-tuning)
# ============================================================================
# Without LoRA: 3B params, 30GB memory
# With LoRA: 1.6M params, 15GB memory
lora:
  use_lora: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias: none
  task_type: CAUSAL_LM

# ============================================================================
# SFT Training Configuration
# ============================================================================
# Learn from HH-RLHF dataset (160K examples)
sft:
  # Dataset settings
  dataset_name: Anthropic/hh-rlhf
  dataset_split: train
  
  # Training duration (reduced for fast testing)
  num_train_epochs: 5
  max_steps: -1
  
  # Batch sizes (increased for smaller 3B model)
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  
  # Learning rate & optimization
  learning_rate: 0.0002  # Use decimal notation instead of scientific
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  
  # Logging & checkpointing
  logging_steps: 100
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  
  # Data processing
  max_seq_length: 2048
  preprocessing_num_workers: 4
  overwrite_cache: false
  push_to_hub: false
  
  # Output
  output_dir: models/sft
  report_to: []  # Disabled: WandB auth failed

# ============================================================================
# DPO Configuration (Not used in SFT, but defined for completeness)
# ============================================================================
dpo:
  dataset_name: Anthropic/hh-rlhf
  dataset_split: train
  num_train_epochs: 3
  max_steps: -1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.00005  # 5e-5 in decimal form
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  beta: 0.1
  label_smoothing: 0.0
  loss_type: sigmoid
  logging_steps: 100
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  max_prompt_length: 512
  max_target_length: 1024
  preprocessing_num_workers: 4
  output_dir: outputs/models/dpo
  report_to: [wandb]
