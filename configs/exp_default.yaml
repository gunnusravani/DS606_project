seed: 0
output_dir: outputs

datasets:
  prompts_paths:
    - data/prompts/xsafety.jsonl
    - data/prompts/indicsafe.jsonl
    - data/prompts/india_harms.jsonl

model:
  name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
  torch_dtype: bfloat16
  device_map: auto

generation:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  batch_size: 4
